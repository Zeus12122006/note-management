[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_sqlite', 'php83Extensions.sqlite3', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.openssl', 'php83Extensions.tokenizer', 'php83Extensions.fileinfo', 'php83Extensions.ctype', 'php83Extensions.bcmath', 'nodejs_22']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci',
    'npm run build'
]

[phases.build]
cmds = [
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
    'mkdir -p storage/app/public',
    'php artisan storage:link || true'
]

[start]
cmd = 'php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
